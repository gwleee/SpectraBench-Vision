# SpectraVision Production Docker Compose Configuration
# Uses pre-built images from GitHub Container Registry
# Optimized for production with scaling support and improved resource management
version: '3.8'

# Define common configurations using YAML anchors
x-common-prod-config: &common-prod-config
  runtime: nvidia
  restart: unless-stopped
  env_file:
    - ../.env
  environment:
    - PYTHONPATH=/workspace:/workspace/VLMEvalKit
  volumes:
    - shared_outputs:/workspace/outputs  # Named volume for outputs
    - shared_data:/workspace/data        # Named volume for data
    - model_cache:/root/.cache/huggingface  # HF model cache volume
    # Note: Source code is embedded in the container images for production
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: ${GPU_COUNT:-1}
            capabilities: [gpu]

services:
  # Legacy models container (transformers 4.33.0)
  transformers-4-33:
    <<: *common-prod-config
    image: ghcr.io/gwleee/spectravision-4.33:latest
    # No container_name for scaling support
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
    shm_size: ${SHM_SIZE_LEGACY:-8gb}
    profiles: ["legacy", "all"]
    networks:
      - spectravision
    healthcheck:
      test: ["CMD", "python", "-c", "import transformers; print(f'Transformers {transformers.__version__} ready!')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Current stable models container (transformers 4.37.2)
  transformers-4-37:
    <<: *common-prod-config
    image: ghcr.io/gwleee/spectravision-4.37:latest
    # No container_name for scaling support
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0,1}
    shm_size: ${SHM_SIZE_STABLE:-16gb}
    profiles: ["stable", "all"]
    networks:
      - spectravision
    healthcheck:
      test: ["CMD", "python", "-c", "import transformers; print(f'Transformers {transformers.__version__} ready!')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mid-range modern models container (transformers 4.43.0)
  transformers-4-43:
    <<: *common-prod-config
    image: ghcr.io/gwleee/spectravision-4.43:latest
    # No container_name for scaling support
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0,1,2}
    shm_size: ${SHM_SIZE_MODERN:-8gb}
    profiles: ["modern", "all"]
    networks:
      - spectravision
    healthcheck:
      test: ["CMD", "python", "-c", "import transformers; print(f'Transformers {transformers.__version__} ready!')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Latest models container (transformers 4.49.0)
  transformers-4-49:
    <<: *common-prod-config
    image: ghcr.io/gwleee/spectravision-4.49:latest
    # No container_name for scaling support
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0,1,2,3}
    shm_size: ${SHM_SIZE_LATEST:-16gb}
    profiles: ["latest", "all"]
    networks:
      - spectravision
    healthcheck:
      test: ["CMD", "python", "-c", "import transformers; print(f'Transformers {transformers.__version__} ready!')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cutting-edge models container (transformers 4.51.0)
  transformers-4-51:
    <<: *common-prod-config
    image: ghcr.io/gwleee/spectravision-4.51:latest
    # No container_name for scaling support
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    shm_size: ${SHM_SIZE_CUTTING_EDGE:-32gb}
    profiles: ["cutting-edge", "all"]
    networks:
      - spectravision
    healthcheck:
      test: ["CMD", "python", "-c", "import transformers; print(f'Transformers {transformers.__version__} ready!')"]
      interval: 30s
      timeout: 10s
      retries: 3

# Named volumes for shared data - persist across container restarts
volumes:
  shared_outputs:
    driver: local
  shared_data:
    driver: local
  model_cache:
    driver: local

# Networks for inter-container communication
networks:
  spectravision:
    driver: bridge

# Usage examples:
# ===============

# Pull all images (recommended first step):
#   docker-compose -f docker/docker-compose.prod.yml pull

# Single GPU (default):
#   docker-compose -f docker/docker-compose.prod.yml --profile stable up -d

# Multi-GPU A100 dual setup:
#   GPU_COUNT=2 NVIDIA_VISIBLE_DEVICES=0,1 docker-compose -f docker/docker-compose.prod.yml --profile stable up -d

# Multi-GPU A100 quad setup:
#   GPU_COUNT=4 NVIDIA_VISIBLE_DEVICES=0,1,2,3 docker-compose -f docker/docker-compose.prod.yml --profile all up -d

# High-density GPU cluster (10+ GPUs):
#   GPU_COUNT=16 NVIDIA_VISIBLE_DEVICES=all docker-compose -f docker/docker-compose.prod.yml --profile all up -d

# Specific GPU selection (e.g., use GPUs 0,2,4,6):
#   NVIDIA_VISIBLE_DEVICES=0,2,4,6 docker-compose -f docker/docker-compose.prod.yml --profile latest up -d

# Scaling support (start 3 instances of transformers-4-37):
#   docker-compose -f docker/docker-compose.prod.yml --profile stable up -d --scale transformers-4-37=3

# Start all containers:
#   docker-compose -f docker/docker-compose.prod.yml --profile all up -d

# System health verification:
#   docker-compose -f docker/docker-compose.prod.yml --profile all up -d && sleep 30 && docker-compose -f docker/docker-compose.prod.yml ps

# Monitor logs:
#   docker-compose -f docker/docker-compose.prod.yml logs -f

# Check health status:
#   docker-compose -f docker/docker-compose.prod.yml ps

# Enter a running container (replace service_name_1 with actual container name):
#   docker exec -it $(docker-compose -f docker/docker-compose.prod.yml ps -q transformers-4-37 | head -1) /bin/bash

# Health check individual containers:
#   docker-compose -f docker/docker-compose.prod.yml exec transformers-4-49 python -c "import transformers; print(f'{transformers.__version__} OK')"