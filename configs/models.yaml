# SpectraVision Docker Multi-Version Model Configuration
# Separates models by transformer version requirements to avoid dependency conflicts
# Note: Models marked with 'token_required: true' need Hugging Face API token in .env file

# Current single-environment configuration (keep as reference)
transformers_4_37:
  description: "Current SpectraVision models - well tested and stable"
  version: "4.37.2"
  models:
    # Small models (≤3B)
    - name: "InternVL2-2B"
      vlm_id: "InternVL2-2B"
      memory_gb: 8
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    - name: "MiniCPM-V-2_6"
      vlm_id: "MiniCPM-V-2_6"
      memory_gb: 12
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    # Medium models (4-10B)
    - name: "LLaVA-1.5-7B"
      vlm_id: "llava_v1.5_7b"
      memory_gb: 25
      
    - name: "CogVLM-7B"
      vlm_id: "cogvlm-chat"
      memory_gb: 28
      
    - name: "InternVL2-8B"
      vlm_id: "InternVL2-8B"
      memory_gb: 30
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    - name: "ShareGPT4V-7B"
      vlm_id: "sharegpt4v_7b"
      memory_gb: 25
      
    - name: "MMAlaya2"
      vlm_id: "MMAlaya2"
      memory_gb: 30
      
    # Large models (>10B)
    - name: "LLaVA-1.5-13B"
      vlm_id: "llava_v1.5_13b"
      memory_gb: 45

# Legacy models requiring older transformer versions
transformers_4_33:
  description: "Legacy models requiring transformers 4.33.0 - Qwen and older models"
  version: "4.33.0"
  models:
    # Small models (≤7B)
    - name: "InstructBLIP-7B"
      vlm_id: "instructblip_7b"
      memory_gb: 25
      note: "Replaced VisualGLM-6B to avoid sat package dependency issues"
      
    # Qwen2-VL-2B moved to transformers_4_49 for proper compatibility
      
    # Medium models (7-9B)
    - name: "Qwen-VL-Chat"
      vlm_id: "qwen_chat"
      memory_gb: 25
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    - name: "mPLUG-Owl2-7B"
      vlm_id: "mPLUG-Owl2"
      memory_gb: 26
      
    - name: "Monkey-7B"
      vlm_id: "monkey"
      memory_gb: 28
      
    - name: "InternLM-XComposer2-7B"
      vlm_id: "XComposer2"
      memory_gb: 26
      
    - name: "IDEFICS-9B"
      vlm_id: "idefics_9b_instruct"
      memory_gb: 32
      
    # Large models (13B)
    - name: "InstructBLIP-13B"
      vlm_id: "instructblip_13b"
      memory_gb: 45
      
    - name: "PandaGPT-13B"
      vlm_id: "PandaGPT_13B"
      memory_gb: 48

# Modern models requiring newer transformer versions
transformers_4_43:
  description: "Mid-range modern models requiring transformers 4.43.0-4.44.0"
  version: "4.43.0"
  models:
    # Small-medium models
    - name: "Phi-3.5-Vision"
      vlm_id: "Phi-3.5-Vision"
      memory_gb: 18
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    - name: "Moondream2"
      vlm_id: "Moondream2"
      memory_gb: 8
      token_required: true
      note: "Gated model - requires Hugging Face API token"

# Latest generation models
transformers_4_49:
