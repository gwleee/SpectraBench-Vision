      note: "Gated model - requires Hugging Face API token"
      
    - name: "Aria-3.9B"
      vlm_id: "Aria"
      memory_gb: 15
      
    # Medium models
    - name: "Qwen2.5-VL-7B"
      vlm_id: "Qwen2.5-VL-7B-Instruct"
      memory_gb: 30
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    - name: "Pixtral-12B"
      vlm_id: "Pixtral-12B"
      memory_gb: 40
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    # Large models (multi-GPU recommended)
    - name: "Qwen2.5-VL-32B"
      vlm_id: "Qwen2.5-VL-32B-Instruct"
      memory_gb: 140
      multi_gpu_recommended: true
      min_gpu_count: 2
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    - name: "Qwen2.5-VL-72B"
      vlm_id: "Qwen2.5-VL-72B-Instruct"
      memory_gb: 300
      multi_gpu_required: true
      min_gpu_count: 4
      token_required: true
      note: "Gated model - requires Hugging Face API token"

# Cutting-edge models
transformers_4_51:
  description: "Cutting-edge models requiring transformers 4.51.0+ - Latest releases"
  version: "4.51.0"
  models:
    # Large modern models
    - name: "Phi-4-Vision"
      vlm_id: "Phi-4-Vision"
      memory_gb: 45
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    # Ultra-large MoE models (multi-GPU required)
    - name: "Llama-4-Scout"
      vlm_id: "Llama-4-Scout-17B-16E-Instruct"
      memory_gb: 200
      multi_gpu_required: true
      min_gpu_count: 4
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    # Note: Some experimental ultra-large models removed due to VLMEvalKit compatibility
    # These models can be added back when VLMEvalKit adds support:
    # - InternVL2-78B (no VLMEvalKit support)
    # - Qwen2.5-VL-500B (no VLMEvalKit support) 
    # - LLaVA-NeXT-405B (no VLMEvalKit support)

# Hardware tier recommendations for Docker deployment
hardware_tiers:
  budget:
    gpu_memory: "8-16GB"
    recommended_containers: ["transformers_4_49"]  # SmolVLM series
    max_models: 3
    
  consumer:
    gpu_memory: "16-24GB" 
    recommended_containers: ["transformers_4_37", "transformers_4_43"]
    max_models: 8
    
  professional:
    gpu_memory: "28-48GB"
    recommended_containers: ["transformers_4_37", "transformers_4_33", "transformers_4_49"]
    max_models: 15
    
  datacenter_single:
    gpu_memory: "80GB (single GPU)"
    recommended_containers: ["all"]
    max_models: "25+ (single GPU models)"
    
  datacenter_multi:
    gpu_memory: "Any GPU type, multiple cards"
    gpu_count: "2-8 GPUs"
    recommended_containers: ["all"]
    max_models: "35+ (including ultra-large models)"
    supports_distributed: true
    note: "RTX 4090 x2, V100 x4, A100 x2, H100 x2, etc."
    
  cluster:
    gpu_memory: "Any GPU type, 10+ cards"
    gpu_count: "10-64+ GPUs"
    recommended_containers: ["all"]
    max_models: "40+ (including cluster-scale models)"
    supports_distributed: true
    cluster_mode: true
    note: "Supports unlimited GPU count for massive model evaluation"
    examples: ["DGX-2 (16x V100)", "DGX A100 (8x A100)", "Custom cluster (20+ RTX 4090)"]

# Container deployment strategy
deployment_strategy:
  parallel_containers: true
  gpu_allocation: "per_container"  # Each container gets dedicated GPU(s)
  shared_volumes:
    - "./outputs:/workspace/outputs"
    - "./data:/workspace/data"
    - "./configs:/workspace/configs"
  
# Total model expansion:
# Current (4.37 only): ~8 models
# With Docker multi-version: 30 models across all transformer versions (VLMEvalKit compatible)
# Estimated performance improvement: 3.75x more comprehensive evaluation coverage