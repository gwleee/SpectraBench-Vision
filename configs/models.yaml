      vlm_id: "SmolVLM-500M"
      memory_gb: 4
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    - name: "SmolVLM-1.7B"
      vlm_id: "SmolVLM"
      memory_gb: 8
      token_required: true
      note: "Gated model - requires Hugging Face API token"
      
    # Small models (including relocated Qwen2-VL-2B)
    - name: "Qwen2-VL-2B"
      vlm_id: "Qwen2-VL-2B-Instruct"
      memory_gb: 8
      token_required: true
