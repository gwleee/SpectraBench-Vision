name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
    paths:
      - 'docker/**'
      - 'spectravision/**'
      - '.github/workflows/build-and-push-docker.yml'
  release:
    types: [published]
  workflow_dispatch:  # 수동 실행 가능

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: spectravision

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        version: [4.33, 4.37, 4.43, 4.49, 4.51]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-${{ matrix.version }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build base image (for version 4.37 only)
      if: matrix.version == '4.37'
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/base/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-base:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/transformers-${{ matrix.version }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  update-compose:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update docker-compose.prod.yml
      run: |
        sed -i "s/yourusername/${{ github.repository_owner }}/g" docker/docker-compose.prod.yml

    - name: Create Quick Start guide
      run: |
        cat > QUICK_START_DOCKER.md << EOF
        # SpectraVision Quick Start with Docker 🚀

        ## 빠른 시작 (5분)

        \`\`\`bash
        # 1. 저장소 클론
        git clone https://github.com/${{ github.repository }}.git
        cd SpectraVision

        # 2. 환경 설정
        cp .env.template .env
        # .env 파일에 HF_TOKEN 추가

        # 3. 미리 빌드된 이미지 다운로드
        docker-compose -f docker/docker-compose.prod.yml pull

        # 4. 실행
        python scripts/main.py
        # → "2. Multi-Version Docker" 선택
        \`\`\`

        ## 사용 가능한 이미지

        총 **29개 모델**, **24개 벤치마크**, **696개 평가** 가능!
        EOF

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docker/docker-compose.prod.yml QUICK_START_DOCKER.md
        git diff --staged --quiet || git commit -m "Auto-update Docker configurations after image build"
        git push